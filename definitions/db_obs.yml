---
# Observing
target_name:
  short: Target name
  long: Name of current target
  unit:

target_magnitude:
  short: Target visual magnitude
  long: Visual magnitude of the current target
  unit:

target_dec:
  short: Target DEC
  long: Target Declination
  unit: °
  fits_keyword: DEC

target_ra:
  short: Target RA
  long: Target Right Ascension
  unit: °
  fits_keyword: RA

target_spt:
  short: Target SpT
  long: Target spectral type
  unit:

# Centering
centering_manual:
  short: Manual centering flag
  long: Flag do indicate if manual centering is needed
  unit:

# FLI
camera_last_image_path:
  short: Path to saved image
  long: Path to saved image
  unit:

camera_temporary_image_path:
  short: Path to temporary image
  long: Path to temporary image
  unit:

camera_image_count:
  short: Image sequential number
  long: Counter giving the image number
  unit:
  fits_keyword: HIERARCH ESO DET FRAM ID

camera_exposure_time:
  short: Exposure time
  long: Requested exposure time
  unit: s

tcs_header_path:
  short: Path to TCS fits header
  long: Path to TCS fits header generated by the telescope control software
  unit:

# Sequencer
sequencer_status:
  short: Sequencer status
  long: Status of the sequencer waiting/busy/error
  unit:

sequencer_command_received:
  short: Sequencer command received
  long: Command dictionary received by the sequencer
  unit:

sequencer_obs_type:
  short: Sequencer observation type requested
  long: obs type requested to the sequencer
  unit:

sequencer_on_target:
  short: On target
  long: On target
  unit:

t120_host:
  short: T120 server hostname
  long: Hostname of the server where T120 is running
  unit:

observer_name:
  short: Observer name
  long: Name of the current observer
  unit:
  fits_keyword: OBSERVER

observer_email:
  short: Observer email
  long: Email of the current observer
  unit:

# FilterWheel
filterwheel_filter_position:
  short: Filter number
  long: Filter wheel filter position
  unit:
  group: Hardware
  fits_keyword: HIERARCH ESO INS FILT NO

filterwheel_filter_name:
  short: Filter name
  long: Filter wheel filter name
  unit:
  group:
  fits_keyword: HIERARCH ESO INS FILT ID

# ADC
adc_angle:
  short: ADC Angle
  long: Angle between the ADC prisms
  unit: °

# TEL
tel_focus_z:
  short: M2 focus
  long: M2 position in Z
  unit: mm

tel_mp_ie:
  short: PM elevation offset error
  long: Pointing model elevation offset error
  unit:

tel_mp_ia:
  short: PM azimuth offset error
  long: Pointing model azimuth offset error
  unit:

tel_m1_temp:
  short: M1 temperature
  long: M1 temperature
  unit: °C

tel_m2_temp:
  short: M2 temperature
  long: M2 temperature
  unit: °C

tel_ambi_dewp:
  short: Dew point
  long: Dew point
  unit: °C

tel_ambi_pressure:
  short: Atmospheric pressure
  long: Atmospheric pressure
  unit: hPa

tel_ambi_relhum:
  short: Relative humidity
  long: Relative humidity
  unit: '%'

tel_ambi_temp:
  short: Ambient temperature
  long: Ambient temperature
  unit: °C

tel_windir:
  short: Wind direction
  long: Wind direction
  unit: °

tel_windsp:
  short: Wind speed
  long: Wind speed
  unit: m/s

tel_led_status:
  short: Tube led
  long: Tube led
  unit:

focusing_m2_position:
  short: Optimal M2 focus
  long: Optimal M2 position in Z found by focusing sequence
  unit: µm

focusing_temttb:
  short: Telescope bottom temperature when focusing
  long: Temperature at the bottom of the telescope tube during the focusing sequence
  unit: °C

focusing_temtth:
  short: Telescope top temperature when focusing
  long: Temperature at the top of the telescope tube during the focusing sequence
  unit: °C

focusing_f0:
  short: Autofocus constant term
  long: Constant term of autofocus model
  unit: µm

focusing_f1:
  short: Autofocus linear term
  long: Linear term of autofocus model
  unit: µm/°C

# Dead-man
deadman_keepalive:
  short: Dead-man keepalive
  long: Dead-man keepalive (prevent inactivity checks from triggering)
