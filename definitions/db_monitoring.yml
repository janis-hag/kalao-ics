---
# FLI
fli_server_status:
  short: FLI Status
  long: FLI Camera server status
  unit:
  group: FLI

fli_temp_ccd:
  short: FLI CCD Temp.
  long: Temperature of the FLI CCD
  unit: °C
  group: FLI
  fits_keyword: HIERARCH ESO DET CCD TEMP
  error_range: [ -30.1, -29.9 ]

fli_temp_heatsink:
  short: FLI HS Temp.
  long: Temperature of the FLI heatsink
  unit: °C
  group: FLI
  fits_keyword: HIERARCH ESO DET HS TEMP
  warn_range: [ .nan, 30 ]
  error_range: [ .nan, 35 ]

# IPPower
ippower_rtc_status:
  short: IPPower RTC
  long: Status of the RTC on the IPPower
  unit:
  group: IPPower

ippower_bench_status:
  short: IPPower Bench
  long: Status of the bench on the IPPower
  unit:
  group: IPPower

ippower_dm_status:
  short: IPPower DM
  long: Status of the DM on the IPPower
  unit:
  group: IPPower

# Telescope
telescope_altitude:
  short: Tel. Altitude
  long: Telescope altitude
  unit: °
  group: Telescope

telescope_azimut:
  short: Tel. Azimut
  long: Telescope azimut
  unit: °
  group: Telescope

# PLC
shutter_state:
  short: Shutter state
  long: Shutter state
  unit:
  group: Motors
  fits_keyword: HIERARCH ESO INS SHUT ST

flipmirror_position:
  short: Flip mirror position
  long: Flip mirror position
  unit:
  group: Motors
  fits_keyword: HIERARCH ESO INS FLIP MIR

calibunit_position:
  short: Calib Unit position
  long: Calibration Unit position
  unit: mm
  group: Motors
  fits_keyword: HIERARCH ESO INS CALIB POS

calibunit_state:
  short: Calib Unit state
  long: Calibration Unit state
  unit:
  group: Motors

hygro_bench_air:
  short: Bench air hygro.
  long: Hygrometry inside the KalAO enclosure
  unit: '%'
  group: Environment
  fits_keyword: HIERARCH ESO INS ENC RH

temp_bench_air:
  short: Bench air temp.
  long: Temperature inside the KalAO enclosure
  unit: °C
  group: Environment
  fits_keyword: HIERARCH ESO INS TEMP AIR

temp_bench_board:
  short: Bench board temp.
  long: Temperature of the aluminum bench
  unit: °C
  group: Environment
  fits_keyword: HIERARCH ESO INS TEMP BENCH

temp_water_in:
  short: Water in temp.
  long: Temperature of the arriving cooling water
  unit: °C
  group: Cooling
  fits_keyword: HIERARCH ESO INS TEMP WATER IN
  warn_range: [ 6, .nan ]
  error_range: [ 5, 28 ]

temp_water_out:
  short: Water out temp.
  long: Temperature of the leaving cooling water
  unit: °C
  group: Cooling
  fits_keyword: HIERARCH ESO INS TEMP WATER OUT
  warn_range: [ 6, .nan ]
  error_range: [ 5, 28 ]

pump_status:
  short: Pump status
  long: Status of the water cooling system pump
  unit:
  group: Cooling

pump_temp:
  short: Pump temperature
  long: Temperature of the water pump
  unit: °C
  group: Cooling

heater_status:
  short: Heater status
  long: Status of the water cooling system heater
  unit:
  group: Cooling

fan_status:
  short: Exchanger fan status
  long: Status of the heat exchanger fan
  unit:
  group: Cooling

coolant_flow_rate:
  short: Coolant flow rate
  long: Flow rate of the coolant
  unit: l/min
  group: Cooling
  warn_range: [ 1.2, .nan ]
  error_range: [ 0.5, .nan ]

laser_state:
  short: Laser state
  long: Laser calibration lamp state
  unit:
  group: Lamps
  fits_keyword: HIERARCH ESO INS LASER STATE

laser_power:
  short: Laser power
  long: Laser calibration lamp power
  unit: mW
  group: Lamps
  fits_keyword: HIERARCH ESO INS LASER POWER

tungsten_state:
  short: Tungsten state
  long: Tungsten calibration lamp state
  unit:
  group: Lamps
  fits_keyword: HIERARCH ESO INS TUNGSTEN ST

adc1_angle:
  short: ADC1 raw angle
  long: Raw angle of first ADC prism
  unit: °
  group: Motors
  fits_keyword: HIERARCH ESO INS ADC1 ANGLE

adc1_state:
  short: ADC1 state
  long: State of first ADC prism
  unit:
  group: Motors

adc2_angle:
  short: ADC2 raw angle
  long: Raw angle of second ADC prism
  unit: °
  group: Motors
  fits_keyword: HIERARCH ESO INS ADC2 ANGLE

adc2_state:
  short: ADC2 state
  long: State of second ADC prism
  unit:
  group: Motors

filterwheel_filter_position:
  short: Filter number
  long: Filterwheel filter position
  unit:
  group: Motors

filterwheel_filter_name:
  short: Filter name
  long: Filterwheel filter name
  unit:
  group: Motors

