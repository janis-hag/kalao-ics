  rounding: 1
  group: Real-time Computer

rtc_acpitz_acpi-temp1:
  short: Mainboard temp.
  long:  Mainboard temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_coretemp_isa-Package_id_0:
  short: CPU mean temp.
  long:  CPU mean temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_coretemp_isa-Core_0:
  short: Core 0 temp.
  long:  Core 0 temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_coretemp_isa-Core_1:
  short: Core 1 temp.
  long:  Core 1 temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_coretemp_isa-Core_2:
  short: Core 2 temp.
  long:  Core 2 temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_coretemp_isa-Core_3:
  short: Core 3 temp.
  long:  Core 3 temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_coretemp_isa-Core_4:
  short: Core 4 temp.
  long:  Core 4 temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_coretemp_isa-Core_5:
  short: Core 5 temp.
  long:  Core 5 temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_coretemp_isa-Core_6:
  short: Core 6 temp.
  long:  Core 6 temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_coretemp_isa-Core_7:
  short: Core 7 temp.
  long: Core 7 temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

# GPU
gpu_temp:
  short: GPU temperature
  long: Current temperature of the GPU
  unit: °C
  rounding: 2
  group: GPU

gpu_power_draw:
  short: GPU Power draw
  long: Current power draw by the GPU
  unit: W
  rounding: 0
  group: GPU

gpu_memory_used:
  short: GPU memory used
  long: Current used by the GPU
  unit: MiB
  group: GPU

gpu_memory_free:
  short: GPU free memory
  long: Current free memory on the GPU
  unit: MiB
  group: GPU

gpu_load:
  short: GPU load
  long: Current load on the GPU
  unit: '%'
  rounding: 1
  group: GPU

# Tip-Tilt Mirror
ttm_tip:
  short: TTM tip
  long: Tip on Tip-Tilt Mirror
  unit: mrad
  rounding: 2
  group: Tip-Tilt Mirror
  warn_range: [ -2.25, 2.25 ]
  alarm_range: [ -2.5, 2.5 ]

ttm_tilt:
  short: TTM tilt
  long: Tilt on Tip-Tilt Mirror
  unit: mrad
  rounding: 2
  group: Tip-Tilt Mirror
  warn_range: [ -2.25, 2.25 ]
  alarm_range: [ -2.5, 2.5 ]

ttm_offloading:
  short: TTM offloading
  long: State of the offloading from the Tip-Tilt Mirror to the telescope
  unit:
  group: Tip-Tilt Mirror

# Wavefront Sensor
wfs_ccd_temp:
  short: WFS EMCCD temp.
  long: Temperature of the Wavefront Sensor EMCCD
  unit: °C
  rounding: 2
  group: Wavefront Sensor
  alarm_range: [ -60.1, -59.9 ]

wfs_controller_temp:
  short: WFS CNTRLR temp.
  long: Temperature of the Wavefront Sensor controller
  unit: °C
  rounding: 2
  group: Wavefront Sensor

wfs_powersupply_temp:
  short: WFS PSU temp.
  long: Temperature of the Wavefront Sensor power supply
  unit: °C
  rounding: 2
  group: Wavefront Sensor

wfs_fpga_temp:
  short: WFS FPGA temp.
  long: Temperature of the Wavefront Sensor FPGA
  unit: °C
  rounding: 2
  group: Wavefront Sensor

wfs_heatsink_temp:
  short: WFS HS temp.
  long: Temperature of the Wavefront Sensor heatsink
  unit: °C
  rounding: 2
  group: Wavefront Sensor

wfs_detgain:
  short: WFS detector gain
  long: Wavefront Sensor analogic detector gain
  unit:
  group: Wavefront Sensor

wfs_detbias:
  short: WFS detector bias
  long: Wavefront Sensor analogic detector offset
  unit:
  group: Wavefront Sensor

wfs_emgain:
  short: WFS EM gain
  long: EM gain of the Wavefront Sensor
  unit:
  group: Wavefront Sensor
  fits_keyword: HIERARCH ESO AOS WFS EMGAIN

wfs_exposuretime:
  short: WFS exp. time
  long: Exposure time of the Wavefront Sensor EMCCD
  unit: ms
  group: Wavefront Sensor
  fits_keyword: HIERARCH ESO AOS WFS DIT

wfs_acquisition_running:
  short: WFS acqu. running
  long: State of the acqusition of the Wavefront Sensor
  unit:
  group: Wavefront Sensor

wfs_framerate:
  short: WFS framerate
  long: Measured frame rate of the Wavefront Sensor
  unit: Hz
  rounding: 1
  group: Wavefront Sensor
  fits_keyword: HIERARCH ESO AOS WFS FRATE

wfs_autogain_on:
  short: WFS auto-gain state
  long: State of the autogain for the Wavefront Sensor
  unit:
  group: Wavefront Sensor

wfs_autogain_setting:
  short: WFS auto-gain setting
  long: Setting of the autogain for the Wavefront Sensor
  unit:
  group: Wavefront Sensor

wfs_algorithm:
  short: WFS algorithm
  long: Algorithm used to compute slopes
  unit:
  group: Wavefront Sensor

wfs_flux_avg:
  short: WFS avg. flux
  long: Average flux of active subapertures
  unit: ADU
  rounding: 0
  group: Wavefront Sensor

wfs_flux_max:
  short: WFS max. flux
  long: Maximum flux of active subapertures
  unit: ADU
  rounding: 0
  group: Wavefront Sensor

wfs_residual_rms:
  short: WFS RMS error
  long: RMS residual of active subapertures
  unit: px
  rounding: 2
  group: Wavefront Sensor

wfs_slope_x_avg:
  short: WFS Avg. slope X
  long: Average of the slopes in X direction
  unit: px
  rounding: 2
  group: Wavefront Sensor

wfs_slope_y_avg:
  short: WFS Avg. slope Y
  long: Average of the slopes in Y direction
  unit: px
  rounding: 2
  group: Wavefront Sensor

# Deformable mirror
dm_max_stroke:
  short: DM max stroke
  long: Maximum stroke of the DM
  unit:
  group: Deformable Mirror

dm_stroke_mode:
  short: DM stroke mode
  long: Stroke mode of the DM
  unit:
  group: Deformable Mirror

dm_target_stroke:
  short: DM target stroke
  long: Target stroke of the DM
  unit:
  group: Deformable Mirror

# AO loops status
dmloop_on:
  short: DM Loop state
  long: DM Loop state
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS LOOP ST

dmloop_gain:
  short: DM Loop gain
  long: DM Loop gain
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS LOOP GAIN

dmloop_mult:
  short: DM Loop mult. coeff.
  long: DM Loop multiplication coefficient
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS LOOP MULT

dmloop_limit:
  short: DM Loop limit
  long: DM Loop limit
  unit:
  group: Adaptive Optics Loops

ttmloop_on:
  short: TTM Loop state
  long: TTM Loop state
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS TT LOOP ST

ttmloop_gain:
  short: TTM Loop gain
  long: TTM Loop gain
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS TT LOOP GAIN

ttmloop_mult:
  short: TTM Loop mult. coeff.
  long: TTM Loop multiplication coefficient
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS TT LOOP MULT

ttmloop_limit:
  short: TTM Loop limit
  long: TTM Loop limit
  unit:
  group: Adaptive Optics Loops
