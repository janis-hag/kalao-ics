---
# Science Camera
camera_server_status:
  short: Camera server status
  long: Science Camera server status
  unit:
  group: Science Camera
  alarm_values: [ ERROR ]

camera_status:
  short: Camera status
  long: Science Camera status
  unit:
  group: Science Camera
  alarm_values: [ error, unknown, unexpected ]

camera_ccd_temp:
  short: Camera CCD temp.
  long: Temperature of the Science Camera CCD
  unit: °C
  rounding: 2
  group: Science Camera
  alarm_range: [ -30.1, -29.9 ]

camera_heatsink_temp:
  short: Camera HS temp.
  long: Temperature of the Science Camera heatsink
  unit: °C
  rounding: 2
  group: Science Camera
  warn_range: [ .nan, 30 ]
  alarm_range: [ .nan, 35 ]

# IPPower
ippower_rtc_status:
  short: IPPower RTC
  long: Status of the RTC on the IPPower
  unit:
  group: IPPower
  alarm_values: [ -1 ]

ippower_bench_status:
  short: IPPower Bench
  long: Status of the bench on the IPPower
  unit:
  group: IPPower
  alarm_values: [ -1 ]

ippower_dm_status:
  short: IPPower DM
  long: Status of the DM on the IPPower
  unit:
  group: IPPower
  alarm_values: [ -1 ]

# Telescope
telescope_altitude:
  short: Tel. altitude
  long: Telescope altitude
  unit: °
  rounding: 4
  group: Telescope

telescope_azimut:
  short: Tel. azimut
  long: Telescope azimut
  unit: °
  rounding: 4
  group: Telescope

# Hardware
shutter_state:
  short: Shutter state
  long: Shutter state
  unit:
  group: Hardware
  fits_keyword: HIERARCH ESO INS SHUT STATUS
  alarm_values: [ ERROR ]

flipmirror_position:
  short: Flip mirror position
  long: Flip mirror position
  unit:
  group: Hardware
  fits_keyword: HIERARCH ESO INS FLIP STATUS
  alarm_values: [ ERROR, NOT_ENABLED, NOT_INITIALISED ]

calibunit_position:
  short: Calib. Unit position
  long: Calibration Unit position
  unit: mm
  rounding: 2
  group: Hardware
  fits_keyword: HIERARCH ESO INS CALIB POS
  alarm_values: [ .nan ]

calibunit_state:
  short: Calib. Unit state
  long: Calibration Unit state
  unit:
  group: Hardware
  alarm_values: [ ERROR ]

laser_state:
  short: Laser state
  long: Laser calibration lamp state
  unit:
  group: Lamps
  fits_keyword: HIERARCH ESO INS LASER STATUS
  alarm_values: [ ERROR ]

laser_power:
  short: Laser power
  long: Laser calibration lamp power
  unit: mW
  rounding: 2
  group: Lamps
  fits_keyword: HIERARCH ESO INS LASER POWER
  alarm_values: [ .nan ]

tungsten_state:
  short: Tungsten state
  long: Tungsten calibration lamp state
  unit:
  group: Lamps
  fits_keyword: HIERARCH ESO INS TUNGSTEN STATUS
  alarm_values: [ ERROR ]

adc1_angle:
  short: ADC1 raw angle
  long: Raw angle of first ADC prism
  unit: °
  rounding: 2
  group: Hardware
  fits_keyword: HIERARCH ESO INS ADC1 ANGLE
  alarm_values: [ .nan ]

adc1_state:
  short: ADC1 state
  long: State of first ADC prism
  unit:
  group: Hardware
  alarm_values: [ ERROR, NOT_ENABLED, NOT_INITIALISED ]

adc2_angle:
  short: ADC2 raw angle
  long: Raw angle of second ADC prism
  unit: °
  rounding: 2
  group: Hardware
  fits_keyword: HIERARCH ESO INS ADC2 ANGLE
  alarm_values: [ .nan ]

adc2_state:
  short: ADC2 state
  long: State of second ADC prism
  unit:
  group: Hardware
  alarm_values: [ ERROR, NOT_ENABLED, NOT_INITIALISED ]

adc_angle:
  short: ADC angle
  long: Angle between the two ADC prisms
  unit: °
  rounding: 2
  group: Hardware
  alarm_values: [ .nan ]

adc_offset:
  short: ADC offset
  long: Offset of the two ADC prisms
  unit: °
  rounding: 2
  group: Hardware
  alarm_values: [ .nan ]

adc_synchronisation:
  short: ADC synchronisation
  long: State of the ADC synchronisation
  unit:
  group: Hardware

filterwheel_filter_position:
  short: Filter number
  long: Filter wheel filter position
  unit:
  group: Hardware
  fits_keyword: HIERARCH ESO INS FILT NO
  alarm_values: [ -1 ]

filterwheel_filter_name:
  short: Filter name
  long: Filter wheel filter name
  unit:
  group: Hardware
  fits_keyword: HIERARCH ESO INS FILT ID
  alarm_values: [ error ]

# Cooling
coolant_flowrate:
  short: Coolant flow rate
  long: Flow rate of the coolant
  unit: l/min
  rounding: 2
  group: Cooling
  warn_range: [ 1.2, .nan ]
  alarm_range: [ 0.5, .nan ]

coolant_temp_in:
  short: Coolant in temp.
  long: Temperature of the incoming coolant
  unit: °C
  rounding: 2
  group: Cooling
  fits_keyword: HIERARCH ESO INS TEMP WATER IN
  warn_range: [ 6, .nan ]
  alarm_range: [ 5, 28 ]

coolant_temp_out:
  short: Coolant out temp.
  long: Temperature of the outgoing coolant
  unit: °C
  rounding: 2
  group: Cooling
  fits_keyword: HIERARCH ESO INS TEMP WATER OUT
  warn_range: [ 6, .nan ]
  alarm_range: [ 5, 28 ]

pump_status:
  short: Pump status
  long: Status of the cooling system's pump
  unit:
  group: Cooling

pump_temp:
  short: Pump temperature
  long: Temperature of the cooling system's pump
  unit: °C
  rounding: 2
  group: Cooling
  alarm_range: [ .nan, 60 ]

heater_status:
  short: Heater status
  long: Status of the cooling system's heater
  unit:
  group: Cooling

heatexchanger_fan_status:
  short: Heat exchanger fan status
  long: Status of the cooling system's heat exchanger fan
  unit:
  group: Cooling

# Environment
bench_air_hygro:
  short: Bench air hygro.
  long: Hygrometry inside the KalAO enclosure
  unit: '%'
  rounding: 1
  group: Environment
  fits_keyword: HIERARCH ESO INS ENC RHUM
  warn_range: [ 2.5, 60 ]
  alarm_range: [ 2.5, 75 ]

bench_air_temp:
  short: Bench air temp.
  long: Temperature inside the KalAO enclosure
  unit: °C
  rounding: 2
  group: Environment
  fits_keyword: HIERARCH ESO INS ENC TEMP

bench_board_temp:
  short: Bench board temp.
  long: Temperature of the aluminum bench
  unit: °C
  rounding: 2
  group: Environment
  fits_keyword: HIERARCH ESO INS TEMP BENCH

# RTC status
rtc_nvme_pci-Composite:
  short: SSD mean temp.
  long:  SSD mean temperature
  unit: °C
  rounding: 1
  group: Real-time Computer

rtc_nvme_pci-Sensor_1:
