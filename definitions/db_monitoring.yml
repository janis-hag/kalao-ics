# GPU
gpu_current_temp:
  short: GPU temperature
  long: Current temperature of the GPU
  unit: °C
  group: GPU

gpu_power_draw:
  short: GPU power draw
  long: Current power draw by the GPU
  unit: W
  group: GPU

gpu_used_memory:
