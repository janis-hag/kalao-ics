---
# PI Tip/Tilt
pi_tip:
  short: Tip
  long: Tip on Tip-Tilt platform
  unit: mrad
  group: Tip-Tilt

pi_tilt:
  short: Tilt
  long: Tilt on Tip-Tilt platform
  unit: mrad
  group: Tip-Tilt

# Nüvü camera (temperatures)
nuvu_temp_ccd:
  short: EMCCD Temp.
  long: Temperature of the EMCCD
  unit: °C
  group: Nüvü
  error_range: [ -60.1, -59.9 ]

nuvu_temp_controller:
  short: CNTRLR Temp.
  long: Temperature of the Nüvü controller
  unit: °C
  group: Nüvü

nuvu_temp_power_supply:
  short: PSU Temp.
  long: Temperature of the Nüvü power supply
  unit: °C
  group: Nüvü

nuvu_temp_fpga:
  short: FPGA Temp.
  long: Temperature of the Nüvü FPGA
  unit: °C
  group: Nüvü

nuvu_temp_heatsink:
  short: HS Temp.
  long: Temperature of the Nüvü heatsink
  unit: °C
  group: Nüvü

# Nüvü camera (exposure)
nuvu_emgain:
  short: EM Gain
  long: EM gain of the EMCCD
  unit:
  group: Nüvü
  fits_keyword: HIERARCH ESO AOS WFS EMGAIN

nuvu_detgain:
  short: Detector gain
  long: Analogic detector gain
  unit:
  group: Nüvü

nuvu_exposuretime:
  short: Exp. time
  long: Exposure time of the EMCCD
  unit: ms
  group: Nüvü
  fits_keyword: HIERARCH ESO AOS WFS DIT

nuvu_mframerate:
  short: Framerate
  long: Measured frame rate
  unit: Hz
  group: Nüvü
  fits_keyword: HIERARCH ESO AOS WFS FRATE

# Shack-Hartmann WFS
slopes_flux_subaperture_avg:
  short: Avg. flux
  long: Average flux active subapertures
  unit: ADU
  group: Shack-Hartmann WFS

slopes_flux_subaperture_brightest:
  short: Max. flux
  long: Maximum flux active subapertures
  unit: ADU
  group: Shack-Hartmann WFS

slopes_residual:
  short: WFS RMS error
  long: WFS RMS residuals
  unit: px
  group: Shack-Hartmann WFS

# AO loops status
dm_loop_on:
  short: DM Loop ON/OFF
  long: DM Loop ON/OFF
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS LOOP ST

dm_loop_gain:
  short: DM Loop gain
  long: DM Loop gain
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS LOOP GAIN

dm_loop_mult:
  short: DM Loop mult. coeff.
  long: DM Loop multiplication coefficient
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS LOOP MULT

ttm_loop_on:
  short: TTM Loop ON/OFF
  long: TTM Loop ON/OFF
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS TT LOOP ST

ttm_loop_gain:
  short: TTM Loop gain
  long: TTM Loop gain
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS TT LOOP GAIN

ttm_loop_mult:
  short: TTM Loop mult. coeff.
  long: TTM Loop multiplication coefficient
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS TT LOOP MULT
