---
# Tip-Tilt Mirror
ttm_tip:
  short: TTM Tip
  long: Tip on Tip-Tilt Mirror
  unit: mrad
  group: Tip-Tilt Mirror

ttm_tilt:
  short: TTM Tilt
  long: Tilt on Tip-Tilt Mirror
  unit: mrad
  group: Tip-Tilt Mirror

# Wavefront Sensor
wfs_temp_ccd:
  short: WFS EMCCD Temp.
  long: Temperature of the Wavefront Sensor EMCCD
  unit: °C
  group: Wavefront Sensor
  error_range: [ -60.1, -59.9 ]

wfs_temp_controller:
  short: WFS CNTRLR Temp.
  long: Temperature of the Wavefront Sensor controller
  unit: °C
  group: Wavefront Sensor

wfs_temp_powersupply:
  short: WFS PSU Temp.
  long: Temperature of the Wavefront Sensor power supply
  unit: °C
  group: Wavefront Sensor

wfs_temp_fpga:
  short: WFS FPGA Temp.
  long: Temperature of the Wavefront Sensor FPGA
  unit: °C
  group: Wavefront Sensor

wfs_temp_heatsink:
  short: WFS HS Temp.
  long: Temperature of the Wavefront Sensor heatsink
  unit: °C
  group: Wavefront Sensor

wfs_emgain:
  short: WFS EM Gain
  long: EM gain of the Wavefront Sensor
  unit:
  group: Wavefront Sensor
  fits_keyword: HIERARCH ESO AOS WFS EMGAIN

wfs_detgain:
  short: WFS Detector gain
  long: Wavefront Sensor analogic detector gain
  unit:
  group: Wavefront Sensor

wfs_exposuretime:
  short: WFS Exp. time
  long: Exposure time of the Wavefront Sensor EMCCD
  unit: ms
  group: Wavefront Sensor
  fits_keyword: HIERARCH ESO AOS WFS DIT

wfs_framerate:
  short: WFS Framerate
  long: Measured frame rate of the Wavefront Sensor
  unit: Hz
  group: Wavefront Sensor
  fits_keyword: HIERARCH ESO AOS WFS FRATE

wfs_autogain_on:
  short: WFS Auto-gain state
  long: State of the autogain for the Wavefront Sensor
  unit:
  group: Wavefront Sensor

wfs_autogain_setting:
  short: WFS Auto-gain setting
  long: Setting of the autogain for the Wavefront Sensor
  unit:
  group: Wavefront Sensor

wfs_algorithm:
  short: WFS Algorithm
  long: Algorithm used to compute slopes
  unit:
  group: Wavefront Sensor

wfs_flux_avg:
  short: WFS Avg. flux
  long: Average flux of active subapertures
  unit: ADU
  group: Wavefront Sensor

wfs_flux_max:
  short: WFS Max. flux
  long: Maximum flux of active subapertures
  unit: ADU
  group: Wavefront Sensor

wfs_residual_rms:
  short: WFS RMS error
  long: RMS residual of active subapertures
  unit: px
  group: Wavefront Sensor

# Deformable mirror
dm_max_stroke:
  short: DM Max stroke
  long: Maximum stroke of the DM
  unit:
  group: Deformable Mirror

dm_stroke_mode:
  short: DM Stroke mode
  long: Stroke mode of the DM
  unit:
  group: Deformable Mirror

dm_target_stroke:
  short: DM Target stroke
  long: Target stroke of the DM
  unit:
  group: Deformable Mirror

# AO loops status
dmloop_on:
  short: DM Loop state
  long: DM Loop state
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS LOOP ST

dmloop_gain:
  short: DM Loop gain
  long: DM Loop gain
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS LOOP GAIN

dmloop_mult:
  short: DM Loop mult. coeff.
  long: DM Loop multiplication coefficient
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS LOOP MULT

ttmloop_on:
  short: TTM Loop state
  long: TTM Loop state
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS TT LOOP ST

ttmloop_gain:
  short: TTM Loop gain
  long: TTM Loop gain
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS TT LOOP GAIN

ttmloop_mult:
  short: TTM Loop mult. coeff.
  long: TTM Loop multiplication coefficient
  unit:
  group: Adaptive Optics Loops
  fits_keyword: HIERARCH ESO AOS TT LOOP MULT
